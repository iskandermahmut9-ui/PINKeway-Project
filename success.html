<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статус бронирования | PINKeway</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .success-container { text-align: center; padding: 80px 20px; max-width: 500px; margin: 0 auto; }
        .success-icon { font-size: 60px; margin-bottom: 20px; }
        .booking-details { background: #fdf5f8; padding: 25px; border-radius: 12px; margin: 30px 0; text-align: left; border: 1px solid #f2d4e1; }
        .booking-details p { margin: 8px 0; font-size: 1.1em; }
        .btn-home { display: inline-block; padding: 12px 30px; background: #d880a6; color: white; text-decoration: none; border-radius: 30px; font-weight: bold; }
        .btn-home:hover { background: #c66a93; }
    </style>
</head>
<body style="background-color: #f8f9fa;">
<script type="text/javascript">
    (function(m,e,t,r,i,k,a){
        m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
        m[i].l=1*new Date();
        for (var j = 0; j < document.scripts.length; j++) {if (document.scripts[j].src === r) { return; }}
        k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)
    })(window, document,'script','https://mc.yandex.ru/metrika/tag.js?id=108466773', 'ym');

    ym(108466773, 'init', {ssr:true, webvisor:true, clickmap:true, ecommerce:"dataLayer", referrer: document.referrer, url: location.href, accurateTrackBounce:true, trackLinks:true});
</script>
<noscript><div><img src="https://mc.yandex.ru/watch/108466773" style="position:absolute; left:-9999px;" alt="" /></div></noscript>
<div class="success-container">
        <div id="statusIcon" class="success-icon">⏳</div>
        <h1 id="statusTitle" style="color: #333;">Проверяем статус...</h1>
        <p id="statusText" style="color: #666;">Пожалуйста, подождите пару секунд.</p>

        <div id="orderDetails" class="booking-details" style="display: none;">
            <p><strong>Зал:</strong> <span id="resHall"></span></p>
            <p><strong>Дата:</strong> <span id="resDate"></span></p>
            <p><strong>Время:</strong> <span id="resTime"></span></p>
        </div>

        <a href="index.html" class="btn-home">Вернуться на главную</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const savedData = localStorage.getItem('lastBooking');
            
            if (!savedData) {
                // Если зашли случайно без брони
                document.getElementById('statusIcon').textContent = '🔍';
                document.getElementById('statusTitle').textContent = 'Бронирование не найдено';
                document.getElementById('statusText').textContent = 'Возможно, вы уже подтвердили его ранее.';
                return;
            }

            const booking = JSON.parse(savedData);
            
            // Если в памяти еще старый формат (без ID), просто показываем как раньше, но честно
            if (!booking.id) {
                 showPendingUI(booking);
                 return;
            }

            // Форматируем красивую дату (ваша функция!)
            const d = new Date(booking.date);
            const months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
            const niceDate = `${d.getDate()} ${months[d.getMonth()]}`;

            // Выводим данные на экран
            document.getElementById('resHall').textContent = booking.hall;
            document.getElementById('resDate').textContent = niceDate;
            document.getElementById('resTime').textContent = booking.time;
            document.getElementById('orderDetails').style.display = 'block';

            // ФУНКЦИЯ ПРОВЕРКИ СТАТУСА
            async function checkStatus() {
                const { data, error } = await supabaseClient
                    .from('booking')
                    .select('status, is_confirmed')
                    .eq('id', booking.id)
                    .single();

                if (data && (data.status === 'paid' || data.is_confirmed)) {
                    // ЕСЛИ ОПЛАЧЕНО
                    document.getElementById('statusIcon').textContent = '✅';
                    document.getElementById('statusTitle').textContent = 'Оплата прошла успешно!';
                    document.getElementById('statusText').textContent = 'Спасибо за бронирование. Ждем вас в нашей студии!';
                    localStorage.removeItem('lastBooking'); // Очищаем память только после реального успеха
                } else {
                    // ЕСЛИ НЕ ОПЛАЧЕНО (или человек вернулся назад)
                    document.getElementById('statusIcon').textContent = '💳';
                    document.getElementById('statusTitle').textContent = 'Заявка принята';
                    document.getElementById('statusText').textContent = 'Мы ожидаем подтверждения оплаты. Это время забронировано за вами на 60 минут.';
                }
            }

            // Запускаем проверку
            checkStatus();
            // Повторяем проверку через 3 секунды, вдруг ЮKassa просто долго думает
            setTimeout(checkStatus, 3000);

            function showPendingUI(b) {
                document.getElementById('statusIcon').textContent = '💳';
                document.getElementById('statusTitle').textContent = 'Заявка принята';
                document.getElementById('statusText').textContent = 'Мы ожидаем подтверждения оплаты от банка.';
            }
        });
    </script>
</body>
</html>
