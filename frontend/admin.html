<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления | PINKeway</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background-color: #f4f4f9; }
        .admin-container { max-width: 1000px; margin: 50px auto; padding: 20px; }
        
        #loginSection { background: var(--white); padding: 40px; border-radius: 15px; max-width: 400px; margin: 100px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        #loginSection input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--gray); border-radius: 8px; box-sizing: border-box; }
        
        #dashboardSection { display: none; background: var(--white); padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--gray); }
        th { background-color: var(--light-pink); color: var(--pink); }
        
        .action-btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; margin-right: 5px; }
        .btn-confirm { background-color: #27ae60; }
        .btn-delete { background-color: #e74c3c; }

        /* --- СТИЛИ КАЛЕНДАРЯ ДЛЯ АДМИНА --- */
        .admin-calendar-box { background: var(--white); padding: 25px; border-radius: 12px; border: 1px solid var(--pink); margin-bottom: 30px; }
        .month-selector { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background-color: var(--light-pink); border-radius: 12px; padding: 5px 10px; }
        .month-btn { background: var(--white); border: 1px solid var(--pink); color: var(--pink); font-size: 1.2em; font-weight: bold; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; }
        .month-label { font-weight: 600; font-size: 1.1em; color: var(--dark); text-transform: uppercase; }
        
        .date-slider { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 10px; scrollbar-width: none; }
        .date-card { min-width: 80px; padding: 10px 5px; text-align: center; border: 1px solid var(--gray); border-radius: 12px; cursor: pointer; }
        .date-card.active { background-color: var(--pink); color: var(--white); border-color: var(--pink); }
        .date-card .day-name { font-size: 0.75em; text-transform: uppercase; margin-bottom: 5px; font-weight: 600; }
        .date-card .day-number { font-size: 1.4em; font-weight: bold; }
        
        .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .time-btn { padding: 12px; border: 1px solid var(--gray); border-radius: 8px; font-size: 1em; text-align: center; font-family: inherit; }
        
        /* Цвета статусов */
        .status-free { background-color: #f8f9fa; color: var(--dark); cursor: default; }
        .status-pending { background-color: #f39c12; color: white; border-color: #f39c12; cursor: pointer; box-shadow: 0 4px 10px rgba(243, 156, 18, 0.3); }
        .status-confirmed { background-color: #e74c3c; color: white; border-color: #e74c3c; cursor: not-allowed; text-decoration: line-through; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <h2 class="logo-text">PINK<strong>EWAY</strong> <span style="font-size: 0.5em; color: #666;">/ ADMIN</span></h2>
    </div>
    <nav>
        <a href="#" id="logoutBtn" style="display: none; color: #e74c3c;">Выйти</a>
    </nav>
</header>

<div class="admin-container">
    <div id="loginSection">
        <h2 style="color: var(--pink); margin-bottom: 20px;">Вход для администратора</h2>
        <input type="email" id="adminEmail" placeholder="Email" required>
        <input type="password" id="adminPassword" placeholder="Пароль" required>
        <button id="loginBtn" class="btn-gold" style="width: 100%; padding: 12px;">Войти</button>
        <p id="loginError" style="color: red; display: none; margin-top: 10px;">Неверный логин или пароль</p>
    </div>

    <div id="dashboardSection">
        <h2>Сводка</h2>
        <div class="stats-container" style="display: flex; gap: 20px; margin-bottom: 25px;">
            <div style="background: var(--light-pink); padding: 20px; border-radius: 12px; flex: 1; text-align: center; border: 1px dashed var(--pink);">
                <h3 style="margin: 0 0 10px 0; color: var(--dark); font-size: 1.1em;">Выручка за месяц</h3>
                <div id="monthlyRevenue" style="font-size: 2em; font-weight: bold; color: var(--pink);">0 ₽</div>
            </div>
            <div style="background: var(--light-pink); padding: 20px; border-radius: 12px; flex: 1; text-align: center; border: 1px dashed var(--pink);">
                <h3 style="margin: 0 0 10px 0; color: var(--dark); font-size: 1.1em;">Успешных броней</h3>
                <div id="monthlyBookings" style="font-size: 2em; font-weight: bold; color: var(--pink);">0</div>
            </div>
        </div>

        <div class="admin-calendar-box">
            <h3 style="margin-top: 0; margin-bottom: 15px; color: var(--dark);">Сетка расписания</h3>
            
            <select id="adminHallSelect" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid var(--gray); border-radius: 8px; font-size: 1em; outline: none; background: var(--white);">
                <option value="Фортесса">Фортесса</option>
                <option value="Black Royal">Black Royal</option>
                <option value="Респекта">Респекта</option>
                <option value="Атлантис">Атлантис</option>
                <option value="Аквалия">Аквалия</option>
                <option value="Крем">Крем</option>
            </select>

            <div class="month-selector">
                <button class="month-btn" id="adminPrevMonth">&lt;</button>
                <div class="month-label" id="adminMonthLabel">Март 2026</div>
                <button class="month-btn" id="adminNextMonth">&gt;</button>
            </div>
            
            <div class="date-slider" id="adminDateSlider"></div>
            <div class="time-grid" id="adminTimeGrid"></div>

            <div style="margin-top: 20px; display: flex; gap: 15px; font-size: 0.85em; color: #666; justify-content: center;">
                <div><span style="display:inline-block; width:12px; height:12px; border:1px solid var(--gray); background:#f8f9fa; border-radius:3px; vertical-align:middle;"></span> Свободно</div>
                <div><span style="display:inline-block; width:12px; height:12px; background:#f39c12; border-radius:3px; vertical-align:middle;"></span> Ожидает</div>
                <div><span style="display:inline-block; width:12px; height:12px; background:#e74c3c; border-radius:3px; vertical-align:middle;"></span> Занято</div>
            </div>
        </div>

        <h2>Последние заявки</h2>
        <table>
            <thead>
                <tr>
                    <th>Дата / Время</th>
                    <th>Зал</th>
                    <th>Клиент</th>
                    <th>Контакты</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="bookingsTableBody">
                <tr>
                    <td colspan="6" style="text-align: center; color: #666;">Загрузка данных...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
